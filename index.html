<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Space</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 { color: #ffcc00; margin-bottom: 5px; }
        h2 { color: #ffffff; margin-top: 40px; }
        .subtitle { color: #b3b3b3; margin-bottom: 30px; }
        
        /* Social Media Buttons */
        .links a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .links a:hover { transform: scale(1.05); }
        .discord-btn { background-color: #5865F2; }
        .youtube-btn { background-color: #FF0000; }
        
        /* Gallery Layout */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            padding: 20px;
        }
        .gallery-item {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            max-width: 320px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .gallery-item p {
            margin: 12px 0 0 0;
            font-size: 15px;
            color: #e0e0e0;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Space</h1>
    <p class="subtitle">Check out my links, comics, and uploads below!</p>

    <!-- Social Media Buttons -->
    <div class="links">
        <a href="https://discord.com/invite/8QfHdyU" target="_blank" class="discord-btn">Join My Discord</a>
        <a href="https://www.youtube.com/@MrWizzzOfficial" target="_blank" class="youtube-btn">Subscribe on YouTube</a>
    </div>

    <hr style="border: 0; border-top: 1px solid #2c2c2c; margin: 40px auto; width: 80%;">

    <!-- Gallery / Comic Section -->
    <h2>Comics & Photos</h2>
    <div class="gallery">
        
        <!-- First Image Card -->
        <div class="gallery-item">
            <!-- REPLACE comic1.png WITH YOUR EXACT UPLOADED FILENAME -->
            <img src="comic1.png" alt="Comic Panel">
            <p>Comic Page 1</p>
        </div>

        <!-- Second Image Card -->
        <div class="gallery-item">
            <!-- REPLACE photo1.jpg WITH YOUR EXACT UPLOADED FILENAME -->
            <img src="photo1.jpg" alt="Uploaded Photo">
            <p>Cool Photo</p>
        </div>

    </div>

</body>
</html>
