<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard's Paradise</title>
    <style>
        /* Base setup and dark grey background */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #1a1a1a; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Crimson Red Flare */
        .flare-crimson {
            position: absolute;
            top: -15%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(220, 20, 60, 0.3) 0%, transparent 65%);
            filter: blur(80px);
            z-index: 1;
        }

        /* Ambient Neon Blue Flare */
        .flare-blue {
            position: absolute;
            bottom: -15%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.25) 0%, transparent 65%);
            filter: blur(80px);
            z-index: 1;
        }

        /* Container to keep text above the flares */
        .content-container {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* Text Styling */
        h1 {
            color: #ffffff;
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            /* Dual-color text glow to tie into the background */
            text-shadow: 
                0 0 15px rgba(220, 20, 60, 0.6), 
                0 0 30px rgba(0, 212, 255, 0.6);
        }
    </style>
</head>
<body>
    <!-- Background Flares -->
    <div class="flare-crimson"></div>
    <div class="flare-blue"></div>
    
    <!-- Main Content -->
    <div class="content-container">
        <h1>Wizard's Paradise</h1>
    </div>
</body>
</html>
