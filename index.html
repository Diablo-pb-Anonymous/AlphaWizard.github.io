<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Space</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 { color: #ffcc00; margin-bottom: 5px; }
        h2 { color: #ffffff; margin-top: 40px; }
        .subtitle { color: #b3b3b3; margin-bottom: 30px; }
        
        /* Social Media Buttons */
        .links a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .links a:hover { transform: scale(1.05); }
        .discord-btn { background-color: #5865F2; }
        .youtube-btn { background-color: #FF0000; }
        
        /* Gallery Layout */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            padding: 20px;
        }
        .gallery-item {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            max-width: 320px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s; 
        }
        .gallery-item:hover {
            transform: translateY(-5px); 
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .gallery-item p {
            margin: 12px 0 0 0;
            font-size: 15px;
            color: #e0e0e0;
        }

        /* Modal CSS */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(5px); 
        }
        .modal-content {
            background-color: #1a1a1a;
            margin: 5% auto; 
            padding: 20px;
            border: 1px solid #333;
            border-radius: 12px;
            width: 90%;
            max-width: 700px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover, .close-btn:focus {
            color: #ff0000;
        }
        .iframe-container {
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .download-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        #heartBtn {
            background: none;
            border: none;
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.2s;
            outline: none;
        }
        #heartBtn:hover {
            transform: scale(1.15);
        }

        /* --- NEW: Floating Counter / Appreciation Button CSS --- */
        .floating-counter {
            position: fixed;
            bottom: 25px;
            left: 25px; /* Positioned to the bottom left */
            background-color: #2c2c2c;
            color: #ffcc00;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: transform 0.1s, background-color 0.2s;
            z-index: 999;
            user-select: none;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .floating-counter:hover {
            background-color: #3d3d3d;
            transform: scale(1.05);
        }
        .floating-counter:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>Welcome to My Space</h1>
    <p class="subtitle">Check out my links, comics, and uploads below!</p>

    <!-- Social Media Buttons -->
    <div class="links">
        <a href="https://discord.com/invite/8QfHdyU" target="_blank" class="discord-btn">Join My Discord</a>
        <!-- The YouTube button is visible but the link is disabled -->
        <a href="javascript:void(0);" class="youtube-btn">Subscribe on YouTube</a>
    </div>

    <hr style="border: 0; border-top: 1px solid #2c2c2c; margin: 40px auto; width: 80%;">

    <!-- Gallery / Comic Section -->
    <h2>Comics & Photos</h2>
    <div class="gallery">
        
        <!-- First Image Card -->
        <div class="gallery-item" style="cursor: pointer;" onclick="openModal('1A0eKGCCzA6V-_q39a3wlylCn6W7Zm6Mq', 'Evangelion v14 (2015)')">
            <img src="comic1.png" alt="Evangelion Cover">
            <p>Evangelion v14 (2015)</p>
        </div>

        <!-- Second Image Card -->
        <div class="gallery-item">
            <img src="photo1.jpg" alt="Uploaded Photo">
            <p>Cool Photo</p>
        </div>

    </div>

    <!-- The Modal Popup -->
    <div id="comicModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="comicTitle" style="margin-top: 10px;">Comic Title</h2>
            
            <!-- Read-Only PDF Viewer (Google Drive Iframe) -->
            <div class="iframe-container">
                <iframe id="pdfViewer" src="" width="100%" height="400px" frameborder="0" allow="autoplay"></iframe>
            </div>

            <!-- Like to Download Section -->
            <div class="download-section">
                <p style="color: #b3b3b3; margin-bottom: 10px;">Like this comic to download!</p>
                <button id="heartBtn" onclick="likeAndDownload()">🤍</button>
            </div>
        </div>
    </div>

    <!-- --- NEW: Floating Counter / Thumbs Up Button --- -->
    <div class="floating-counter" onclick="giveThumbsUp()">
        👍 <span id="appreciationCount">0</span>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Store the current file ID
        let currentFileId = "";

        // Function to open the modal
        function openModal(fileId, title) {
            currentFileId = fileId;
            
            // Set the title in the modal
            document.getElementById("comicTitle").innerText = title;
            
            // Set up the Google Drive preview link
            const previewUrl = `https://drive.google.com/file/d/${fileId}/preview`;
            document.getElementById("pdfViewer").src = previewUrl;
            
            // Reset the heart button to white/unliked state
            const heartBtn = document.getElementById("heartBtn");
            heartBtn.innerText = "🤍"; 
            
            // Show the modal window
            document.getElementById("comicModal").style.display = "block";
        }

        // Function to close the modal
        function closeModal() {
            document.getElementById("comicModal").style.display = "none";
            // Clear the iframe so it stops loading/playing when closed
            document.getElementById("pdfViewer").src = ""; 
        }

        // Function triggered when the heart button is clicked
        function likeAndDownload() {
            const heartBtn = document.getElementById("heartBtn");
            
            // Change heart to red to show it is liked
            heartBtn.innerText = "❤️";
            
            // Generate the direct download link for the Google Drive file
            const downloadUrl = `https://drive.google.com/uc?export=download&id=${currentFileId}`;
            
            // Trigger the download automatically
            window.location.href = downloadUrl;
        }

        // Close the modal if the user clicks anywhere outside of the content box
        window.onclick = function(event) {
            const modal = document.getElementById("comicModal");
            if (event.target == modal) {
                closeModal();
            }
        }

        /* --- FLOATING COUNTER & APPRECIATION LOGIC --- */
        // Get the current count from local storage, or start at 0
        let visitorCount = localStorage.getItem('mySpaceCounter') || 0;
        
        // Ensure it is treated as a number
        visitorCount = parseInt(visitorCount);

        // Auto-increment as a "visit" immediately when the page loads
        visitorCount++;
        localStorage.setItem('mySpaceCounter', visitorCount);
        
        // Update the button text on the screen
        document.getElementById('appreciationCount').innerText = visitorCount;

        // Function triggered when the thumbs up button is clicked manually
        function giveThumbsUp() {
            // Increase the number by 1
            visitorCount++;
            
            // Save it back to the browser's local storage
            localStorage.setItem('mySpaceCounter', visitorCount);
            
            // Update the text on the screen
            document.getElementById('appreciationCount').innerText = visitorCount;
        }
    </script>
</body>
</html>
